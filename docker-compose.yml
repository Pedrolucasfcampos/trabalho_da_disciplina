services:
  redis:
    image: redis:7-alpine
    container_name: nosql_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: nosql_mongodb
    ports:
      - "27017:27017"
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  cassandra:
    image: cassandra:4.1
    container_name: nosql_cassandra
    ports:
      - "9042:9042"
    restart: unless-stopped
    environment:
      CASSANDRA_CLUSTER_NAME: "nosql-cluster"
      CASSANDRA_DC: "dc1"
      CASSANDRA_ENDPOINT_SNITCH: "GossipingPropertyFileSnitch"
    volumes:
      - cassandra_data:/var/lib/cassandra

  neo4j:
    image: neo4j:5-community
    container_name: nosql_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/password123
    volumes:
      - neo4j_data:/data

volumes:
  mongo_data:
  cassandra_data:
  neo4j_data:
